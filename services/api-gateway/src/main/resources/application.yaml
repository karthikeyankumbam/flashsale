server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: http://localhost:8086
              predicates:
                - Path=/auth/**
            - id: catalog
              uri: http://localhost:8085
              predicates:
                - Path=/products/**
            - id: cart
              uri: http://localhost:8084
              predicates:
                - Path=/cart/**
            - id: orders
              uri: http://localhost:8081
              predicates:
                - Path=/orders/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5435/payment
    username: payment
    password: payment
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.flashsale.payment.events"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "com.flashsale.payment.events.PaymentRequestedEvent"
    producer:
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
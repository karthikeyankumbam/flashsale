server:
  port: 8082

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:postgresql://localhost:5434/inventory
    username: inventory
    password: inventory
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.flashsale.order.events,com.flashsale.inventory.events"
        spring.json.value.default.type: "com.flashsale.inventory.events.OrderCreatedEvent"
        spring.json.use.type.headers: false
        properties.spring.json.value.default.type: com.flashsale.inventory.events.OrderCreatedEvent

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
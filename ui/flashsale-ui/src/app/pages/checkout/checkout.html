<div class="header">
  <div>
    <h2>Checkout</h2>
    <div class="sub">User: {{ userId }}</div>
  </div>

  <div class="actions">
    <button mat-stroked-button (click)="load()">Refresh</button>
    <a mat-stroked-button routerLink="/cart">Back</a>
    <button mat-raised-button color="primary" (click)="placeOrder()" [disabled]="placing || !hasItems()">
      Place Order
    </button>
  </div>
</div>

<div class="center" *ngIf="loading">
  <mat-spinner diameter="36"></mat-spinner>
</div>

<mat-card *ngIf="!loading && cart && cart.items.length === 0" class="empty">
  Cart is empty. Go to <a routerLink="/products">Products</a>.
</mat-card>

<mat-card *ngIf="!loading && cart && cart.items.length > 0" class="summary">
  <div class="line" *ngFor="let i of cart.items">
    <div>
      <div class="name">{{ prices[i.sku]?.name || i.sku }}</div>
      <div class="meta">{{ i.sku }} • Qty {{ i.qty }}</div>
    </div>
    <div class="price" *ngIf="prices[i.sku]">
      {{ prices[i.sku].unitPrice * i.qty }} {{ prices[i.sku].currency }}
    </div>
    <div class="meta" *ngIf="!prices[i.sku]">Loading price…</div>
  </div>

  <div class="total">
    <div>Total</div>
    <div class="price">{{ total() }} {{ currency() }}</div>
  </div>
</mat-card>
